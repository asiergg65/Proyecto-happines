<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>H&Co - Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .bg-pink-corp { background-color: #ba007c; } .bg-gray-corp { background-color: #555555; } </style>
</head>
<body class="bg-white">
<header class="w-full bg-white sticky top-0 z-50">
    <div class="container mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center md:items-end">
        <div class="flex-shrink-0 mb-6 md:mb-0"><a href="index.html"><img src="assets/img/happines-and-co-propuesta-02.png" alt="Logo" class="h-14 md:h-20 w-auto object-contain"></a></div>
        <div class="flex flex-col items-center md:items-end gap-4">
            <p class="text-[9px] font-bold tracking-[0.4em] text-gray-300 uppercase leading-none md:mr-1">GIJÓN / XIXÓN</p>
            <nav class="bg-gray-100 rounded-full px-6 py-3 border border-gray-200">
                <ul class="flex flex-wrap justify-center md:justify-end gap-x-6 md:gap-x-10">
                    <li><a href="index.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">Inicio</a></li>
                    <li><a href="proximos.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">Eventos</a></li>
                    <li><a href="historial.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">Historial</a></li>
                    <li><a href="sobre-nosotros.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">Nosotros</a></li>
                    <li><a href="fuentes.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">Fuentes</a></li>
                    <li><a href="contacto.html" class="inline-block text-[10px] font-bold uppercase tracking-[0.3em] text-black border-b-2 border-black">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>
    <main class="max-w-lg mx-auto py-12 px-6">
        <form class="space-y-4 bg-gray-50 p-10 rounded shadow-xl">
            <h2 class="text-3xl font-black text-center uppercase tracking-tighter">Contacto</h2>
            <input type="text" placeholder="Tu Nombre" class="w-full p-3 border rounded" required>
            <input type="email" placeholder="Tu Correo" class="w-full p-3 border rounded" required>
            <textarea placeholder="Mensaje" class="w-full p-3 border rounded" rows="4"></textarea>
            <label class="flex items-center gap-2"><input type="checkbox"> Suscribirme</label>
            <button class="w-full bg-pink-corp text-white py-3 font-bold hover:opacity-90">ENVIAR</button>
        </form>
    </main>
    <footer class="py-10 text-center"><img src="happines-and-co-propuesta-06.jpg" class="h-10 mx-auto opacity-50"></footer>
</body>
</html>
